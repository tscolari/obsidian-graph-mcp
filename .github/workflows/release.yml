name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Go binaries
        run: |
          GOOS=linux  GOARCH=amd64 go build -o obsidian-graph-mcp-linux-amd64  .
          GOOS=linux  GOARCH=arm64 go build -o obsidian-graph-mcp-linux-arm64  .
          GOOS=darwin GOARCH=amd64 go build -o obsidian-graph-mcp-darwin-amd64 .
          GOOS=darwin GOARCH=arm64 go build -o obsidian-graph-mcp-darwin-arm64 .

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: obsidian-plugin/package-lock.json

      - name: Build plugin
        working-directory: obsidian-plugin
        run: npm ci && npm run build

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            obsidian-graph-mcp-linux-amd64
            obsidian-graph-mcp-linux-arm64
            obsidian-graph-mcp-darwin-amd64
            obsidian-graph-mcp-darwin-arm64
            obsidian-plugin/main.js
            obsidian-plugin/manifest.json
            obsidian-plugin/versions.json
